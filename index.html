<!DOCTYPE html>
<html>
<head>
  <title>Play Audio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎵 Playing Audio...</h2>
    <audio autoplay controls>
      <source src="https://raw.githubusercontent.com/senghock0612/word_audio/main/cat00001.mp3" type="audio/mp3">
    </audio>
  </div>
</body>
</html>
